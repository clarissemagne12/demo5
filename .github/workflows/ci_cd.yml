name: Java CI Debug

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Debug Java et Maven
      - name: Debug environment
        run: |
          echo "OS info:"
          uname -a
          echo "Java version before setup:"
          java -version || echo "Java not installed yet"
          echo "Maven version before setup:"
          mvn -version || echo "Maven not installed yet"

      # 3. Installer Java explicitement
      - name: Set up Java 17 (temurin)
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # 4. Vérifier l'installation de Java
      - name: Verify Java
        run: |
          java -version
          javac -version
          mvn -version

      # 5. Build Maven
      - name: Build project
        run: mvn clean package --batch-mode

      # 6. Upload JAR
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: my-app-jar
          path: target/*.jar