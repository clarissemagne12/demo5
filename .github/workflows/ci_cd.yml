name: Java CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'       # JDK open-source recommandé
          java-version: '17'            # Version de Java, par ex. 17, 20, etc.
          cache: 'maven'                # Active le cache Maven pour accélérer les builds

      # 3. Build le projet avec Maven
      - name: Build project
        run: mvn clean install

      # 4. Run tests (optionnel si inclus dans mvn install)
      - name: Run tests
        run: mvn test

      # 5. Package le JAR
      - name: Package JAR
        run: mvn package

      # 6. Upload artifact (optionnel)
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: my-app-jar
          path: target/*.jar