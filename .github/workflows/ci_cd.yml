name: Test CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Java + Maven (OFFICIEL)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # 3. Build sans bloquer sur les tests
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Vérifier que le JAR existe
      - name: Check JAR
        run: ls -la target/

      # 5. Test rapide du JAR (optionnel mais pro)
      - name: Run JAR (smoke test)
        run: |
          java -jar target/*.jar --server.port=0 &
          sleep 10

      # 6. Upload du JAR
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo5-jar
          path: target/*.jar