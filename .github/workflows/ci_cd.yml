name: Java CI with Maven Manual Install

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Installer Java 17 manuellement
      - name: Install Java 17
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          java -version
          javac -version

      # 3. Installer Maven manuellement
      - name: Install Maven
        run: |
          sudo apt-get install -y maven
          mvn -version

      # 4. Construire le projet
      - name: Build with Maven
        run: mvn clean package --batch-mode

      # 5. Upload du JAR
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v3
        with:
          name: my-app-jar
          path: target/*.jar